<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>INSS Master AI • Professor Virtual da Central 135</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-deep: #09090b;
            --bg-panel: #111115;
            --bg-card: #18181d;
            --border: #26262c;
            --accent: #7c3aed;
            --accent-glow: #a78bfa;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --radius: 16px;
            --radius-sm: 11px;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }
        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .glass {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }
        .glass-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.22s ease;
            cursor: pointer;
        }
        .glass-card:hover {
            border-color: var(--accent-glow);
            box-shadow: 0 0 22px rgba(124, 58, 237, 0.35);
            transform: translateY(-2px);
        }

        .btn-accent {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 25px;
            padding: 10px 19px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 8px 18px rgba(124, 58, 237, 0.45);
        }
        .btn-accent:hover {
            background: #8b5cf6;
            box-shadow: 0 12px 26px rgba(139, 92, 246, 0.6);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent-glow);
            border-radius: 25px;
            padding: 9px 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
        }
        .btn-outline:hover {
            background: rgba(124, 58, 237, 0.08);
        }

        .chat-bubble-user {
            background: var(--accent);
            color: #fff;
            border-radius: 20px 20px 6px 20px;
            padding: 12px 18px;
            max-width: 78%;
            align-self: flex-end;
            box-shadow: 0 6px 16px rgba(124, 58, 237, 0.5);
            animation: slideUp 0.25s ease;
        }
        .chat-bubble-ai {
            background: #1a1a21;
            border: 1px solid #2a2a33;
            border-radius: 20px 20px 20px 6px;
            padding: 16px 18px;
            max-width: 88%;
            align-self: flex-start;
            animation: slideUp 0.3s ease;
            line-height: 1.5;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .highlight-box {
            border-left: 3px solid var(--accent);
            background: rgba(124, 58, 237, 0.06);
            padding: 10px 14px;
            border-radius: 0 10px 10px 0;
            margin: 8px 0;
            font-size: 0.9em;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 26px;
            max-width: 600px;
            width: 92%;
            max-height: 84vh;
            overflow-y: auto;
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.9);
        }
        .flashcard-container {
            perspective: 1100px;
            width: 100%;
            height: 240px;
            cursor: pointer;
        }
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.45s ease;
            transform-style: preserve-3d;
        }
        .flashcard-inner.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 22px;
            text-align: center;
            background: var(--bg-card);
            border: 2px solid var(--border);
        }
        .flashcard-back {
            border-color: var(--accent);
            transform: rotateY(180deg);
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: absolute;
                z-index: 50;
                height: 100%;
                width: 275px;
                box-shadow: 10px 0 30px #000;
            }
            .sidebar.visible {
                display: flex;
            }
            .mobile-toggle {
                display: flex !important;
            }
            .chat-bubble-user,
            .chat-bubble-ai {
                max-width: 93%;
            }
        }
        .mobile-toggle {
            display: none;
        }
        .tag-suggestion {
            background: rgba(124, 58, 237, 0.15);
            color: #c4b5fd;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            cursor: pointer;
            border: 1px solid rgba(124, 58, 237, 0.35);
            transition: 0.2s;
        }
        .tag-suggestion:hover {
            background: rgba(124, 58, 237, 0.28);
            border-color: #a78bfa;
        }
    </style>
</head>
<body>

    <aside id="sidebar" class="sidebar w-72 flex-shrink-0 h-full bg-[#0c0c10] border-r border-[#23232a] flex flex-col z-40">
        <div class="p-5 border-b border-[#23232a] flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-700 to-indigo-800 flex items-center justify-center text-white"><i class="fa-solid fa-building-columns"></i></div>
            <div><h2 class="font-bold text-base text-white">INSS Master AI</h2><p class="text-xs text-gray-400">Central 135 · Professor</p></div>
        </div>
        <div class="flex-1 overflow-y-auto p-3 space-y-1" id="topicList"></div>
        <div class="p-3 border-t border-[#23232a] space-y-2">
            <button onclick="openFlashcards()" class="btn-outline w-full text-sm flex items-center justify-center gap-2 py-2.5"><i class="fa-solid fa-layer-group"></i> Flashcards</button>
            <button onclick="openQuiz()" class="btn-outline w-full text-sm flex items-center justify-center gap-2 py-2.5"><i class="fa-solid fa-circle-question"></i> Quiz</button>
            <button onclick="clearChat()" class="w-full text-sm py-2.5 text-gray-400 border border-gray-700 rounded-full bg-transparent cursor-pointer hover:text-white">Limpar Conversa</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative bg-[#09090b]">
        <button class="mobile-toggle absolute top-4 left-4 z-30 bg-[#1a1a21] text-white p-2.5 rounded-xl border border-[#333] cursor-pointer" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
        <header class="flex items-center px-5 py-3 border-b border-[#23232a] bg-[#0c0c10] flex-shrink-0 gap-3">
            <div class="w-8 h-8 rounded-lg bg-purple-700/40 flex items-center justify-center"><i class="fa-solid fa-robot text-purple-300"></i></div>
            <span class="font-semibold text-white text-sm">INSS Master AI</span>
            <span class="text-xs text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded-full">didático</span>
        </header>
        <div id="chatContainer" class="flex-1 overflow-y-auto px-4 py-4 space-y-4 flex flex-col"></div>
        <div class="px-4 pb-4 pt-2 flex-shrink-0">
            <div class="glass p-2 flex items-center gap-2 max-w-3xl mx-auto">
                <input id="userInput" type="text" placeholder="Digite sua dúvida sobre INSS..." class="flex-1 bg-transparent text-white placeholder-gray-500 px-3 py-2.5 outline-none text-sm border-none" onkeydown="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()" class="btn-accent flex items-center gap-1 px-4 py-2 text-sm"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
            <div class="flex gap-2 mt-2 max-w-3xl mx-auto flex-wrap" id="quickButtons"></div>
        </div>
    </main>

    <div id="flashcardModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="modal-content"><div class="flex justify-between mb-3"><h3 class="text-white font-bold text-lg"><i class="fa-solid fa-layer-group text-purple-400"></i> Flashcards</h3><button onclick="document.getElementById('flashcardModal').classList.add('hidden')" class="text-gray-400 hover:text-white text-2xl">&times;</button></div>
            <div class="flashcard-container mb-4" onclick="flipFlashcard()"><div id="flashcardInner" class="flashcard-inner"><div class="flashcard-front"><span class="text-xs text-purple-400">PERGUNTA</span><p id="flashcardQ" class="text-white text-lg mt-2"></p></div><div class="flashcard-back"><span class="text-xs text-emerald-400">DECORE</span><p id="flashcardA" class="text-white text-lg mt-2 font-bold"></p></div></div></div>
            <div class="flex gap-3 justify-center"><button onclick="prevFlashcard()" class="btn-outline text-sm px-4 py-2"><i class="fa-solid fa-arrow-left"></i></button><button onclick="nextFlashcard()" class="btn-accent text-sm px-4 py-2">Próximo</button></div><p class="text-center text-xs text-gray-500 mt-3" id="flashcardCounter"></p></div>
    </div>
    <div id="quizModal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
        <div class="modal-content"><div class="flex justify-between mb-3"><h3 class="text-white font-bold text-lg"><i class="fa-solid fa-circle-question text-yellow-400"></i> Quiz 135</h3><button onclick="document.getElementById('quizModal').classList.add('hidden')" class="text-gray-400 hover:text-white text-2xl">&times;</button></div>
            <p id="quizQuestion" class="text-white text-base font-medium mb-3"></p><div id="quizOptions" class="space-y-2 mb-3"></div><p id="quizFeedback" class="text-sm font-semibold text-center min-h-[28px]"></p><p id="quizExplanation" class="text-xs text-gray-400 text-center hidden"></p>
            <div class="flex gap-3 justify-center mt-3"><button onclick="nextQuizQuestion()" class="btn-accent text-sm px-4 py-2">Próxima</button></div><p id="quizScore" class="text-center text-xs text-gray-500 mt-2"></p></div>
    </div>

            // ==================== NLP ENGINE ====================
            function norm(text) {
                return text.toLowerCase()
                    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^a-z0-9\s]/g, ' ')
                    .replace(/\s+/g, ' ').trim();
            }
            const STOPWORDS = ['de', 'da', 'do', 'das', 'dos', 'e', 'a', 'o', 'que', 'para', 'com', 'um', 'uma', 'no',
                'na', 'os', 'as', 'por', 'em', 'qual', 'como', 'quanto', 'tempo', 'precisa', 'ter', 'fazer', 'pedir',
                'solicitar', 'sobre', 'esse', 'essa', 'isso', 'aquilo', 'me', 'te', 'se', 'nos', 'lhe', 'pois', 'mas',
                'ou', 'nem', 'tambem', 'muito', 'pouco', 'mais', 'menos', 'cada', 'todo', 'toda'
            ];

            function cleanQuery(text) {
                return text.split(' ').filter(w => !STOPWORDS.includes(w) && w.length > 1).join(' ');
            }

            function matchScore(entry, normQ, cleanQ) {
                let score = 0;
                const terms = [...entry.palavras_chave, ...entry.aliases.map(a => norm(a))];
                for (const t of terms) {
                    if (normQ.includes(t)) score += 22;
                    const tWords = t.split(' ');
                    const matched = tWords.filter(tw => cleanQ.split(' ').includes(tw)).length;
                    if (matched >= 3) score += 15;
                    else if (matched === 2) score += 9;
                    else if (matched === 1 && tWords.length === 1 && t.length >= 4) score += 5;
                }
                if (normQ.includes(norm(entry.titulo))) score += 18;
                if (normQ.includes(norm(entry.categoria))) score += 4;
                return score;
            }

            function searchBest(query) {
                const nQ = norm(query);
                const cQ = cleanQuery(nQ);
                if (cQ.length < 2) return { entry: null, confidence: 0 };
                let best = null;
                let bestScore = 0;
                let all = [];
                for (const e of DB) {
                    const s = matchScore(e, nQ, cQ);
                    all.push({ entry: e, score: s });
                    if (s > bestScore) { bestScore = s;
                        best = e; }
                }
                all.sort((a, b) => b.score - a.score);
                const confidence = Math.min(bestScore / 55, 1.0);
                return { entry: best, confidence, suggestions: all.slice(0, 4).filter(a => a.score > 8).map(a => a
                        .entry) };
            }

            // ==================== CONTEXTO ====================
            let contextTopic = null;
            let contextLastQuery = '';

            function detectSubIntent(query, context) {
                const q = norm(query);
                if (!context) return null;
                if (q.includes('carência') || q.includes('carencia')) return 'carência';
                if (q.includes('documento') || q.includes('papel') || q.includes('precisa levar')) return 'documentos';
                if (q.includes('negar') || q.includes('negado') || q.includes('indeferido')) return 'quando_negado';
                if (q.includes('exemplo') || q.includes('pratico')) return 'exemplo';
                if (q.includes('decorar') || q.includes('frase') || q.includes('resumo')) return 'decorar';
                if (q.includes('como explicar') || q.includes('central')) return 'dica_135';
                if (q.includes('pegadinha') || q.includes('erro')) return 'pegadinha';
                return null;
            }

            function isContinuation(query) {
                const q = norm(query);
                return /^(e\s|no\s|na\s|e\sno\s|e\sna\s|nesse\s|nessa\s|desse\s|dessa\s|sobre\sesse\s|sobre\sessa\s)/.test(
                    q) && q.split(' ').length <= 4;
            }

            // ==================== RESPONSE BUILDER ====================
            function buildDidacticResponse(entry) {
                let h = '<div class="space-y-2">';
                h +=
                    `<div class="highlight-box" style="border-left-color:#10b981;"><span class="text-emerald-400 font-semibold text-sm">✅ O QUE É</span><p class="text-white text-sm mt-1 font-medium">${entry.conceito}</p></div>`;
                h +=

                if (entry.exemplo) h +=
                    `<div class="highlight-box" style="border-left-color:#34d399;"><span class="text-emerald-300 font-semibold text-sm">📌 EXEMPLO REAL</span><p class="text-gray-200 text-sm mt-1">${entry.exemplo}</p></div>`;
                if (entry.pegadinha) h +=

                if (entry.erro_comum) h +=
                    `<div class="highlight-box" style="border-left-color:#ef4444;"><span class="text-red-400 font-semibold text-sm">🚫 ERRO COMUM</span><p class="text-gray-200 text-sm mt-1">${entry.erro_comum}</p></div>`;
                if (entry.dica_135) h +=
                    `<div class="highlight-box" style="border-left-color:#c084fc;"><span class="text-purple-300 font-semibold text-sm">📞 COMO EXPLICAR NO 135</span><p class="text-gray-200 text-sm mt-1">${entry.dica_135}</p></div>`;
                h +=
                    `<div class="highlight-box" style="border-left-color:#f59e0b; background:rgba(245,158,11,0.08);"><span class="text-amber-400 font-semibold text-sm">🧠 FRASE PRA DECORAR</span><p class="text-white text-sm font-bold mt-1">${entry.decorar}</p></div>`;
                h +=
                    `<div class="flex gap-2 mt-3 flex-wrap"><button onclick="showDecorar('${entry.id}')" class="text-xs bg-yellow-500/12 text-yellow-300 px-3 py-1.5 rounded-full border border-yellow-500/35 hover:bg-yellow-500/20 cursor-pointer">🧠 Decorar</button><button onclick="openQuizWithTopic('${entry.id}')" class="text-xs bg-emerald-500/12 text-emerald-300 px-3 py-1.5 rounded-full border border-emerald-500/35 hover:bg-emerald-500/20 cursor-pointer">❓ Quiz</button></div></div>`;
                return h;
            }

            function buildSubIntentResponse(entry, subIntent) {
                let resp = '';
                switch (subIntent) {
                    case 'carência':
                        resp =

                    case 'exemplo':

                        break;
                    case 'decorar':
                        resp =
                            `<div class="highlight-box" style="border-left-color:#f59e0b;"><span class="text-amber-400 font-semibold text-sm">📎 Frase para decorar — ${entry.titulo}:</span><p class="text-white text-sm font-bold mt-1">${entry.decorar}</p></div>`;
                        break;
                    case 'dica_135':
                        resp =
                            `<div class="highlight-box" style="border-left-color:#c084fc;"><span class="text-purple-300 font-semibold text-sm">📎 Como explicar ${entry.titulo} no 135:</span><p class="text-white text-sm mt-1">${entry.dica_135 || 'Explique de forma simples e direta.'}</p></div>`;
                        break;
                    case 'pegadinha':
                        resp =
                            `<div class="highlight-box" style="border-left-color:#fbbf24;"><span class="text-yellow-400 font-semibold text-sm">📎 Pegadinha de ${entry.titulo}:</span><p class="text-white text-sm mt-1">${entry.pegadinha || 'Não há uma pegadinha específica.'}</p></div>`;
                        break;
                    default:
                        resp = buildDidacticResponse(entry);
                }
                return `<div class="space-y-1"><p class="text-xs text-gray-500 mb-1">📎 Continuando sobre <strong>${entry.titulo}</strong>:</p>${resp}</div>`;
            }

            // ==================== CHAT ENGINE ====================
            function addMsg(html, isUser = false) {
                const c = document.getElementById('chatContainer');
                const d = document.createElement('div');
                d.className = isUser ? 'chat-bubble-user' : 'chat-bubble-ai';
                d.innerHTML = isUser ? `<p class="text-sm">${html}</p>` : html;
                c.appendChild(d);
                c.scrollTop = c.scrollHeight;
            }

            function showTyping() {
                const c = document.getElementById('chatContainer');
                const d = document.createElement('div');
                d.className = 'chat-bubble-ai';
                d.id = 'typingIndicator';
                d.innerHTML =
                    '<div class="flex items-center gap-2"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span class="text-xs text-gray-400">preparando aula...</span></div>';
                c.appendChild(d);
                c.scrollTop = c.scrollHeight;
            }

            function removeTyping() { const e = document.getElementById('typingIndicator'); if (e) e.remove(); }

            function processMsg(text) {
                addMsg(text, true);
                showTyping();
                setTimeout(() => {
                    removeTyping();
                    const sub = detectSubIntent(text, contextTopic);
                    if (sub && contextTopic) {
                        addMsg(buildSubIntentResponse(contextTopic, sub));
                        return;
                    }
                    if (isContinuation(text) && contextTopic) {
                        const rest = norm(text).replace(/^(e\s|no\s|na\s|e\sno\s|e\sna\s|nesse\s|nessa\s|desse\s|dessa\s)/,
                            '');
                        const sr = searchBest(rest);
                        if (sr.confidence >= CONFIDENCE_THRESHOLD && sr.entry && sr.entry.id === contextTopic.id) {
                            addMsg(buildSubIntentResponse(contextTopic, 'carência'));
                            return;
                        }
                    }
                    const result = searchBest(text);
                    if (result.confidence >= CONFIDENCE_THRESHOLD && result.entry) {
                        contextTopic = result.entry;
                        contextLastQuery = text;
                        addMsg(buildDidacticResponse(result.entry));
                    } else if (result.suggestions && result.suggestions.length > 0) {
                        let h =
                            '<p class="text-sm text-gray-300 mb-2">🤔 Não encontrei exatamente esse tema. Você quis dizer:</p><div class="flex flex-wrap gap-2">';
                        result.suggestions.slice(0, 4).forEach(s => {
                            h +=
                                `<span class="tag-suggestion" onclick="sendPreset('${s.titulo}')">${s.titulo}</span>`;
                        });
                        h += '</div>';
                        addMsg(h);
                        contextTopic = null;
                    } else {
                        addMsg(
                            '<p class="text-sm text-gray-300">Não consegui identificar o tema. Pergunte sobre <strong>carência, período de graça, aposentadoria por idade, auxílio-doença, BPC/LOAS</strong> ou outro tópico do INSS.</p>'
                            );
                        contextTopic = null;
                    }
                }, 550);
            }

            function genQuiz() {
                const entry = qzEntry || DB[Math.floor(Math.random() * DB.length)];
                qzEntry = null;
                const q = `❓ ${entry.titulo}: qual a frase correta para decorar?`;
                document.getElementById('quizQuestion').textContent = q;
                qzCorrect = entry.decorar;
                const others = DB.filter(e => e.id !== entry.id).sort(() => Math.random() - 0.5).slice(0, 3);
                const opts = [{ text: entry.decorar, correct: true, explanation: entry.conceito }, ...others.map(o => ({
                    text: o.decorar,
                    correct: false,
                    explanation: 'Essa frase é de outro tópico: ' + o.titulo
                }))].sort(() => Math.random() - 0.5);
                const cont = document.getElementById('quizOptions');
                cont.innerHTML = opts.map((o, i) => `
            <button onclick="selectQuizOpt(${i},this)" data-correct="${o.correct}" data-explanation="${o.explanation.replace(/"/g,'&quot;')}" class="w-full text-left p-3 rounded-xl border border-[#26262c] bg-[#18181d] text-gray-200 text-sm hover:border-purple-500 transition">${String.fromCharCode(65+i)}. ${o.text}</button>
          `).join('');
                document.getElementById('quizFeedback').textContent = '';
                document.getElementById('quizExplanation').classList.add('hidden');
                document.getElementById('quizScore').textContent = `Acertos: ${qzScore}/${qzTotal}`;
            }
            window.selectQuizOpt = function(idx, btn) {
                const correct = btn.dataset.correct === 'true';
                const expl = btn.dataset.explanation;
                qzTotal++;
                if (correct) qzScore++;
                document.querySelectorAll('#quizOptions button').forEach(b => { b.style.pointerEvents = 'none';
                    b.style.opacity = '0.7'; });
                btn.style.borderColor = correct ? '#10b981' : '#ef4444';
                btn.style.background = correct ? 'rgba(16,185,129,0.15)' : 'rgba(239,68,68,0.15)';
                document.getElementById('quizFeedback').textContent = correct ? '✅ Correto! Muito bem!' :
                    '❌ Errado. Veja a explicação:';
                const explEl = document.getElementById('quizExplanation');
                explEl.textContent = expl;
                explEl.classList.remove('hidden');
                document.getElementById('quizScore').textContent = `Acertos: ${qzScore}/${qzTotal}`;
                if (!correct) {
                    document.querySelectorAll('#quizOptions button').forEach(b => { if (b.dataset.correct === 'true') {
                            b.style.borderColor = '#10b981';
                            b.style.background = 'rgba(16,185,129,0.15)'; } });
                }
            };

            // ==================== UI ====================
            function populateSidebar() {
                const list = document.getElementById('topicList');
                const cats = [...new Set(DB.map(e => e.categoria))];
                let h = '';
                cats.forEach(cat => {
                    h +=
                        `<p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-2 mt-3 mb-1">${cat}</p>`;
                    DB.filter(e => e.categoria === cat).forEach(e => {
                        h +=
                            `<div class="glass-card px-3 py-2.5 text-sm text-gray-200 flex items-center gap-2" onclick="sendPreset('${e.titulo}')"><i class="fa-solid fa-bookmark text-purple-400 text-xs"></i><span class="truncate">${e.titulo}</span></div>`;
                    });
                });
                list.innerHTML = h;
            }

            function populateQuickButtons() {
                const c = document.getElementById('quickButtons');
                const sample = ['Carência', 'Período de Graça', 'Qualidade de Segurado', 'Aposentadoria por Idade',
                    'Auxílio-Doença', 'BPC/LOAS'
                ];
                c.innerHTML = sample.map(s =>
                    `<button onclick="sendPreset('${s}')" class="text-xs bg-[#1a1a21] text-gray-300 px-3 py-1.5 rounded-full border border-[#2a2a2e] hover:border-purple-500 transition">${s}</button>`
                    ).join('');
            }
            window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('visible'); };

            populateSidebar();
            populateQuickButtons();
            window.clearChat();
        })();
    </script>
</body>
</html>
